services:
  qwen3tts:
    build:
      context: .
      dockerfile: Dockerfile  # GPU variant; use Dockerfile.cpu for CPU-only
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./models:/models
    environment:
      MODEL_NAME_OR_PATH: ${MODEL_NAME_OR_PATH:-Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice}
      DEVICE: ${DEVICE:-cuda:0}
      PORT: ${PORT:-8000}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
